<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.cdnfonts.com/css/azonix" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="top-space"></div>

<div class="navbar">

    <img
    src="logos/magualogo.webp"
    class="nav-logo">

<i
class="fas fa-user-circle nav-profile"
id="profileBtn">
</i>
</div>

<div class="search-wrapper">

    <div class="search-box">

        <i class="fas fa-search search-icon"></i>

        <input
        class="search-input"
        type="text"
        placeholder="Search for Jewellery">

        <div class="filter-btn">

            <i class="fas fa-sliders-h"></i>

        </div>

    </div>

</div>

<div class="category-scroll">

    <div
        class="category-item active"
        onclick="showCategory('sarees', this)"
    >
        <img src="sares.webp">
        <span>Sarees</span>
    </div>

    <div
        class="category-item"
        onclick="showCategory('jewellery', this)"
    >
        <img src="jewelry.png">
        <span>Jewellery</span>
    </div>

    <div
        class="category-item"
        onclick="showCategory('materials', this)"
    >
        <img src="wedding.png">
        <span>Materials</span>
    </div>

    <div
        class="category-item"
        onclick="showCategory('dresses', this)"
    >
        <img src="wedding-dress.png">
        <span>Dresses</span>
    </div>

    <div
        class="category-item"
        onclick="showCategory('lehengas', this)"
    >
        <img src="lehangas.png">
        <span>Lehengas</span>
    </div>

    <div
        class="category-item"
        onclick="showCategory('makeup', this)"
    >
        <img src="makeup.png">
        <span>Makeup</span>
    </div>

</div>

<div id="sareesContent" class="category-content">

<div class="banner-slider" id="bannerSlider">

    <div class="banner-shimmer"
    id="bannerShimmer"></div>

    <div class="banner-slide active">
        <img src="sarres/banner1.jpg"
        class="banner-img"
        loading="lazy">
    </div>

    <div class="banner-slide">
        <img src="sarres/banner2.webp"
        class="banner-img"
        loading="lazy">
    </div>

    <div class="banner-slide">
        <img src="sarres/banner3.webp"
        class="banner-img"
        loading="lazy">
    </div>


    
</div>

<!-- DOTS -->

<div class="slider-dots">

  <span class="dot active"></span>
  <span class="dot"></span>
  <span class="dot"></span>

</div>
<h2 class="sarees-title">
    SAREES
</h2>

<!-- saress last div-->
</div>


<!-- jewlwey start here -->


<div id="jewelleryContent" class="category-content">

<div class="hero-carousel" id="heroCarousel">

    <div
    class="hero-loading"
    id="heroLoading">
    </div>

    <div class="hero-panel current">
        <img src="jewlery/1.jpg" alt="" loading="lazy">
    </div>

    <div class="hero-panel">
        <img src="jewlery/2.jpg" alt="" loading="lazy">
    </div>

    <div class="hero-panel">
        <img src="jewlery/3.jpg" alt="" loading="lazy">
    </div>

</div>

<div class="hero-indicators">

    <span class="hero-marker current"></span>
    <span class="hero-marker"></span>
    <span class="hero-marker"></span>

</div>

<h2 class="section-title">JEWELLERY</h2>

</div>


<!-- jewlery ends-->


<div id="materialsContent" class="category-content">
 
<div class="showcase-wrap" id="showcaseWrap">

    <div
    class="showcase-loading"
    id="showcaseLoading">
    </div>

    <div class="showcase-item selected">
        <img src="drss/1.jpg" alt="" loading="lazy">
    </div>

    <div class="showcase-item">
        <img src="drss/2.jpg" alt="" loading="lazy">
    </div>

    <div class="showcase-item">
        <img src="drss/3.jpg" alt="" loading="lazy">
    </div>

</div>

<div class="showcase-points">

    <span class="showcase-point selected"></span>
    <span class="showcase-point"></span>
    <span class="showcase-point"></span>

</div>


<h2 class="section-title">MATERIALS</h2>


</div> <!-- drrss materila ends last div-->





<div id="dressesContent" class="category-content">

<div class="flip-gallery" id="flipGallery">

    <div
    class="flip-loading"
    id="flipLoading">
    </div>

    <div class="flip-card open">
        <img src="dresses/1.webp" alt="" loading="lazy">
    </div>

    <div class="flip-card">
        <img src="dresses/2.webp" alt="" loading="lazy">
    </div>

    <div class="flip-card">
        <img src="dresses/3.webp" alt="" loading="lazy">
    </div>

</div>

<div class="flip-tracker">

    <span class="flip-mark open"></span>
    <span class="flip-mark"></span>
    <span class="flip-mark"></span>

</div>

<h2 class="section-title">DRESSES</h2>


</div>





<div id="lehengasContent" class="category-content">



<div class="orbit-box" id="orbitBox">

    <div
    class="orbit-loading"
    id="orbitLoading">
    </div>

    <div class="orbit-frame live">
        <img src="lehangas/1.webp" alt="">
    </div>

    <div class="orbit-frame">
        <img src="lehangas/2.jpg" alt="">
    </div>

    <div class="orbit-frame">
        <img src="lehangas/3.jpg" alt="">
    </div>

</div>

<div class="orbit-nav">

    <span class="orbit-pin live"></span>
    <span class="orbit-pin"></span>
    <span class="orbit-pin"></span>

</div>



<h2 class="section-title">LEHENGAS</h2>





</div>



<div id="makeupContent" class="category-content">




<div class="single-banner">

    <img src="makeup/8.jpg" class="banner-img">

   <div id="bannerChangingText" class="banner-top-text">
    MAKEUP
</div>

</div>





</div>











<!--bottom dev-->

<div class="bottom-nav">
<div class="bottom-item" id="maguaBtn">

    <img
    src="logos/magualogo.webp"
    class="magua-icon">

    <span>Magua</span>

</div>

<div class="bottom-item" id="categoriesBtn">

        <img src="icons/cat.png">

        <span>Categories</span>

    </div>

    <div class="bottom-item">

        <img src="icons/helop.png">

        <span>Help</span>

    </div>

    <div class="bottom-item">

        <img src="icons/myorder.png">

        <span>My Orders</span>

    </div>

</div>
<div class="sheet-backdrop"
id="sheetBackdrop"></div>

<div class="swiggy-sheet"
id="swiggySheet">

    <div class="sheet-bar"></div>

    <div class="sheet-content">

    <img
    src="drss/boutiquw.jpg"
    class="sheet-image">

    <div>

        <div class="sheet-text">
            Magua Ethnics
        </div>

        <div class="sheet-subtext">
            Boutique Design
        </div>

    </div>

</div>

<div class="sheet-divider"></div>

</div>




<div class="sheet-overlay"
id="sheetOverlay"></div>

<div class="category-sheet"
id="categorySheet">

    <div class="sheet-bar"></div>

    <div class="category-title">
        Categories
    </div>

    <div class="category-grid">

        <div class="cat-card">

    <div class="cat-image-wrap">

        <div class="cat-shimmer"></div>

        <img
        src="sares.webp"
        class="cat-image">

    </div>

    <span>Sarees</span>

</div>

<div class="cat-card">

    <div class="cat-image-wrap">

        <div class="cat-shimmer"></div>

        <img
        src="jewelry.png"
        class="cat-image">

    </div>

    <span>Jewellery</span>

</div>

<div class="cat-card">

    <div class="cat-image-wrap">

        <div class="cat-shimmer"></div>

        <img
        src="makeup.png"
        class="cat-image">

    </div>

    <span>Makeup</span>

</div>

<div class="cat-card">

    <div class="cat-image-wrap">

        <div class="cat-shimmer"></div>

        <img
        src="lehangas.png"
        class="cat-image">

    </div>

    <span>Lehengas</span>

</div>

<div class="cat-card">

    <div class="cat-image-wrap">

        <div class="cat-shimmer"></div>

        <img
        src="wedding.png"
        class="cat-image">

    </div>

    <span>Materials</span>

</div>

<div class="cat-card">

    <div class="cat-image-wrap">

        <div class="cat-shimmer"></div>

        <img
        src="wedding-dress.png"
        class="cat-image">

    </div>

    <span>Dresses</span>

</div>

<div class="cat-card">

    <div class="cat-image-wrap">

        <div class="cat-shimmer"></div>

        <img
        src="wedding-dress.png"
        class="cat-image">

    </div>

    <span>Earings</span>

</div>


    </div>

</div>
<div class="user-panel"
id="userPanel">

    <div class="user-handle"></div>

    <div class="user-header">

        <img
        src="logos/magualogo.webp"
        class="user-brand-logo">

       <div class="user-brand-title">
    MAGUA<br>
    ETHNICS
</div>

        <div class="user-brand-subtitle">
            Login
        </div>

    </div>

    <div class="user-form-area">

        <input
        type="text"
        id="userNameInput"
        class="user-input"
        placeholder="Enter Your Name">

        <div class="user-mobile-wrap">

            <span class="user-code">
                +91
            </span>

            <input
            type="tel"
            id="userMobileInput"
            class="user-mobile-input"
            placeholder="9876543210">

        </div>
<label class="privacy-row">

    <input
    type="checkbox"
    id="privacyCheck">

    <span>

        I accept the
        <a href="#">
            Privacy Policy
        </a>
        and
        <a href="#">
            Terms & Conditions
        </a>

    </span>

</label>
        <button
class="user-login-btn"
id="userLoginBtn">

    Login

</button>

    </div>

</div>

<div
class="user-backdrop"
id="userBackdrop">
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>

</body>

</html>
